name: zaimah-landing

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zaimah_web
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Dubai
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
